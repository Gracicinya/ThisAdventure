<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Shattered Crown | Characters</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="characters.css"/>
</head>
<body>

  
  <div class="page-bg"></div>
  <div class="stars"></div>
 
  <nav class="nav">
    <div class="nav-logo">The Shattered Crown</div>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="story.html">Story</a></li>
      <li><a href="characters.html" class="active">Characters</a></li>
      <li><a href="playpreview.html">Play Preview</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
 
  <main>
 
    <section class="section-header">
      <p class="section-eyebrow">Souls of the Twilight Forest</p>
      <h1 class="section-title">Meet the Characters</h1>
      <p class="section-sub">Children of light. Children of darkness. All of them caught between a world coming apart and a crown waiting to be remade.</p>
    </section>
    <div class="crown-divider">&#10022; &#10022; &#10022;</div>
 
    <!-- SLIDER -->
    <section class="slider-section" aria-label="Featured character">
      <div class="slider-track" id="sliderTrack"></div>
      <div class="slider-controls">
        <button class="slider-btn" id="prevBtn" aria-label="Previous">&#8592;</button>
        <div class="slider-dots" id="sliderDots"></div>
        <button class="slider-btn" id="nextBtn" aria-label="Next">&#8594;</button>
      </div>
    </section>
 
    <!-- GRID -->
    <section class="grid-section">
      <div class="grid-header">
        <h2 class="grid-title">All Characters</h2>
        <div class="filter-btns" role="group" aria-label="Filter characters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="protagonist">Protagonists</button>
          <button class="filter-btn" data-filter="ally">Allies</button>
          <button class="filter-btn" data-filter="villain">Enemies</button>
          <button class="filter-btn" data-filter="creature">Creatures</button>
          <button class="filter-btn" data-filter="guardian">Guardians</button>
        </div>
      </div>
      <div class="char-grid" id="charGrid"></div>
    </section>
 
  </main>
 
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
    <div class="modal-box" id="modalBox">
      <button class="modal-close" id="modalClose" aria-label="Close">&#10005;</button>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <script src="characters.js"></script>
</body>
</html>
